<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${card.profile.fullName} ?: 'ID Card Preview'">ID Card Preview</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 24px; background: #f3f4f6; }
        .card { width: 340px; border-radius: 14px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,0.15); background: #ffffff; }
        .card-header { padding: 16px 18px; color: #ffffff; }
        .card-header .org { font-size: 14px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
        .card-header .tagline { font-size: 11px; opacity: .9; margin-top: 2px; }
        .card-body { padding: 18px; overflow: hidden; }
        .photo { box-sizing: border-box; float: left; margin-right: 14px; width: 96px; height: 116px; border-radius: 8px; border: 2px solid #e5e7eb; background-color: #e5e7eb; background-size: cover; background-position: center; }
        .photo-placeholder { box-sizing: border-box; float: left; margin-right: 14px; width: 96px; height: 116px; border-radius: 8px; border: 2px dashed #cbd5e1; color: #94a3b8; font-size: 11px; text-align: center; padding-top: 50px; }
        .details { overflow: hidden; }
        .full-name { font-size: 17px; font-weight: 700; margin: 0 0 4px; }
        .reg-number { font-size: 12px; font-weight: 600; margin: 0 0 8px; }
        .field { font-size: 11px; margin: 2px 0; color: #374151; }
        .field b { color: #111827; }
        .badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; margin-bottom: 6px; }
        .codes { display: table; width: 100%; padding: 0 18px 16px; box-sizing: border-box; }
        .codes .code-cell { display: table-cell; vertical-align: middle; }
        .codes .code-cell.right { text-align: right; }
        .codes img { display: inline-block; }
        .qr { width: 76px; height: 76px; }
        .barcode { height: 46px; max-width: 190px; }
        .footer { padding: 8px 18px 16px; font-size: 10px; color: #6b7280; display: table; width: 100%; box-sizing: border-box; }
        .footer .foot-cell { display: table-cell; }
        .footer .foot-cell.right { text-align: right; }
    </style>
</head>
<body>
<div th:replace="~{::card-fragment}">
    <div class="card" th:fragment="card-fragment"
         th:with="t=${card.template}, p=${card.profile}">
        <div class="card-header" th:style="'background-color: ' + ${t.primaryColor} + ';'">
            <div class="org" th:text="${t.organizationName}">Organization</div>
            <div class="tagline" th:text="${t.tagline}">Official Identification Card</div>
        </div>
        <div class="card-body">
            <div th:if="${card.photoBase64}" class="photo" th:style="'background-image: url(' + ${card.photoBase64} + ');'"></div>
            <div th:unless="${card.photoBase64}" class="photo-placeholder">No Photo</div>
            <div class="details">
                <span class="badge" th:text="${p.type}"
                      th:style="'background-color: ' + ${t.secondaryColor} + '; color: ' + ${t.primaryColor} + ';'">TYPE</span>
                <p class="full-name" th:style="'color: ' + ${t.textColor} + ';'" th:text="${p.fullName}">Full Name</p>
                <p class="reg-number" th:style="'color: ' + ${t.primaryColor} + ';'" th:text="${p.registrationNumber}">2026-ENG-001</p>
                <p class="field" th:if="${p.department}"><b>Dept:</b> <span th:text="${p.department}">Department</span></p>
                <p class="field" th:if="${p.title}"><b>Title:</b> <span th:text="${p.title}">Title</span></p>
                <p class="field" th:if="${p.bloodGroup}"><b>Blood:</b> <span th:text="${p.bloodGroup}">O+</span></p>
                <p class="field" th:if="${p.issueDate}"><b>Issued:</b> <span th:text="${p.issueDate}">2026-01-01</span></p>
                <p class="field" th:if="${p.expiryDate}"><b>Expires:</b> <span th:text="${p.expiryDate}">2027-01-01</span></p>
            </div>
        </div>
        <div class="codes">
            <div class="code-cell"><img th:if="${card.barcodeBase64}" class="barcode" th:src="${card.barcodeBase64}" alt="barcode"/></div>
            <div class="code-cell right"><img th:if="${card.qrBase64}" class="qr" th:src="${card.qrBase64}" alt="qr"/></div>
        </div>
        <div class="footer">
            <span class="foot-cell" th:text="${p.uuid}">uuid</span>
            <span class="foot-cell right">Scan to verify</span>
        </div>
    </div>
</div>
</body>
</html>
