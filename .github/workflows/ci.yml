name: CI/CD

on:
  push:
    branches: ['**']

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: ./mvnw -B -DskipTests clean package

      - name: Test
        run: ./mvnw -B test

      - name: Write Ansible deploy key
        run: |
          mkdir -p "$HOME/.ssh_ci"
          printf '%s\n' "${{ secrets.ANSIBLE_SSH_KEY }}" > "$HOME/.ssh_ci/id_ansible"
          chmod 600 "$HOME/.ssh_ci/id_ansible"

      - name: Deploy via Ansible
        run: |
          cd ansible
          ansible-playbook -i inventory.gha.ini playbook.yml --private-key "$HOME/.ssh_ci/id_ansible"

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Build failed: ${{ github.repository }} @ ${{ github.sha }}"
          to: srengty@gmail.com,${{ github.event.head_commit.author.email }}
          from: GitHub Actions CI
          body: |
            Build/test failed for commit ${{ github.sha }} pushed by ${{ github.event.head_commit.author.name }}.

            Commit message: ${{ github.event.head_commit.message }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
